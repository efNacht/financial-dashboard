{% extends "base.html" %}
{% set active_page = 'summary' %}
{% block title %}Сводная таблица{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Сводная таблица</h1>
  <p class="subtitle" id="subtitle">Выберите год и метрики для анализа</p>
</div>

<div class="toolbar">
  <div class="toolbar-group">
    <label>Текущий год:</label>
    <select id="year-select" onchange="onYearChange()"></select>
  </div>
  <div class="toolbar-group">
    <label>Типы столбцов:</label>
    <button class="toggle-btn active" data-cols="ym2" onclick="toggleColGroup('ym2', this)">Y−2</button>
    <button class="toggle-btn active" data-cols="ym1" onclick="toggleColGroup('ym1', this)">Y−1</button>
    <button class="toggle-btn active" data-cols="y" onclick="toggleColGroup('y', this)">Y</button>
    <button class="toggle-btn active" data-cols="pct" onclick="toggleColGroup('pct', this)">Рост %</button>
    <button class="toggle-btn active" data-cols="diff" onclick="toggleColGroup('diff', this)">Разница руб.</button>
    <button class="toggle-btn active" id="spark-btn" onclick="toggleSparklines(this)">📈 Динамика</button>
  </div>
  <div class="toolbar-group">
    <a href="#" id="export-link" class="btn-export">⬇ Скачать Excel</a>
  </div>
</div>

<div class="toolbar">
  <div class="toolbar-group" style="flex-wrap: wrap;">
    <label>Метрики из ОПиУ:</label>
    <div id="metric-chips" style="display: flex; flex-wrap: wrap; gap: 6px;"></div>
  </div>
</div>

<div class="toolbar">
  <div class="toolbar-group" style="flex: 1;">
    <label>Компании:</label>
    <input type="text" id="company-filter" placeholder="Поиск..." oninput="filterCompanies(this.value)">
    <button class="btn-small" onclick="toggleAllCompanies()">Все / Снять</button>
  </div>
</div>

<div class="company-chips" id="company-chips"></div>

<div class="table-scroll">
  <table class="data-table" id="summary-table">
    <thead></thead>
    <tbody></tbody>
  </table>
</div>

<script>
const DATA = {{ data_json | safe }};

// Available P&L / balance metrics. isPct=true means value is already a percentage (render with .0% suffix).
const METRICS = [
  { key: 'revenue',             label: 'Выручка',                default: true },
  { key: 'net_profit',          label: 'Чистая прибыль',         default: true, profit: true },
  { key: 'gross_profit',        label: 'Валовая прибыль',        default: false, profit: true },
  { key: 'operating_profit',    label: 'Прибыль от продаж',      default: false, profit: true },
  { key: 'profit_before_tax',   label: 'Прибыль до налог.',      default: false, profit: true },
  { key: 'cogs',                label: 'Себестоимость',          default: false },
  { key: 'commercial_expenses', label: 'Коммерч. расходы',       default: false },
  { key: 'admin_expenses',      label: 'Управл. расходы',        default: false },
  { key: 'gross_margin',        label: 'Валовая рентаб.',        default: false, isPct: true },
  { key: 'operating_margin',    label: 'Операц. рентаб.',        default: false, isPct: true },
  { key: 'net_margin',          label: 'Чистая рентаб.',         default: false, isPct: true },
  { key: 'total_assets',        label: 'Активы',                 default: false },
  { key: 'equity',              label: 'Собств. капитал',        default: false },
];

let hiddenColTypes = new Set();
let activeMetrics = new Set(METRICS.filter(m => m.default).map(m => m.key));
let currentYear = null;
let hiddenCompanies = new Set();
let allCompaniesOn = true;
let showSparklines = true;

function toggleSparklines(btn) {
  showSparklines = !showSparklines;
  btn.classList.toggle('active');
  renderTable();
}

function getAllYears() {
  const ys = new Set();
  Object.values(DATA).forEach(c => Object.keys(c.years_data).forEach(y => ys.add(+y)));
  return [...ys].sort();
}
function getAllCompanies() { return Object.entries(DATA).map(([k, c]) => [k, c]); }
function nameOf(c, k) { return c.full_name || k; }

function fmtNum(v) {
  if (v == null || isNaN(v)) return '\u2014';
  return Math.round(v).toLocaleString('ru-RU');
}
function fmtPct(v) {
  if (v == null || isNaN(v)) return '\u2014';
  return (v > 0 ? '+' : '') + Math.round(v * 100) + '%';
}
function fmtMarginPct(v) {
  if (v == null || isNaN(v)) return '\u2014';
  return v.toFixed(1) + '%';
}

function onYearChange() {
  currentYear = +document.getElementById('year-select').value;
  renderTable();
}

function toggleColGroup(type, btn) {
  btn.classList.toggle('active');
  if (btn.classList.contains('active')) hiddenColTypes.delete(type);
  else hiddenColTypes.add(type);
  renderTable();
}

function toggleMetric(key, chip) {
  if (activeMetrics.has(key)) { activeMetrics.delete(key); chip.classList.remove('active'); }
  else { activeMetrics.add(key); chip.classList.add('active'); }
  renderTable();
}

function toggleCompany(k, chip) {
  if (hiddenCompanies.has(k)) { hiddenCompanies.delete(k); chip.classList.add('active'); }
  else { hiddenCompanies.add(k); chip.classList.remove('active'); }
  renderTable();
}

function toggleAllCompanies() {
  allCompaniesOn = !allCompaniesOn;
  const chips = document.querySelectorAll('#company-chips .company-chip');
  if (allCompaniesOn) { hiddenCompanies.clear(); chips.forEach(c => c.classList.add('active')); }
  else { getAllCompanies().forEach(([k]) => hiddenCompanies.add(k)); chips.forEach(c => c.classList.remove('active')); }
  renderTable();
}

function filterCompanies(q) {
  q = q.toLowerCase();
  document.querySelectorAll('#company-chips .company-chip').forEach(chip => {
    chip.style.display = chip.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function buildYearSelect() {
  const years = getAllYears();
  currentYear = years[years.length - 1];
  const sel = document.getElementById('year-select');
  sel.innerHTML = years.map(y => `<option value="${y}" ${y === currentYear ? 'selected' : ''}>${y}</option>`).join('');
}

function buildMetricChips() {
  const container = document.getElementById('metric-chips');
  container.innerHTML = METRICS.map(m =>
    `<span class="company-chip ${activeMetrics.has(m.key) ? 'active' : ''}" onclick="toggleMetric('${m.key}', this)">${m.label}</span>`
  ).join('');
}

function buildCompanyChips() {
  const container = document.getElementById('company-chips');
  container.innerHTML = getAllCompanies().map(([k, c]) =>
    `<span class="company-chip active" onclick="toggleCompany('${k}', this)">${nameOf(c, k)}</span>`
  ).join('');
}

function fmtValCell(v, m) {
  if (v == null) return `<td class="num muted">\u2014</td>`;
  if (m.isPct) return `<td class="num">${fmtMarginPct(v)}</td>`;
  if (v === 0) return `<td class="num">0</td>`;
  const cls = m.profit ? (v >= 0 ? 'positive' : 'negative') : '';
  return `<td class="num ${cls}">${fmtNum(v)}</td>`;
}

// Tiny SVG sparkline — one per (company, metric) showing multi-year trend
function sparkline(values) {
  const vals = values.filter(v => v != null && !isNaN(v));
  if (vals.length < 2) return '';
  const w = 72, h = 22, pad = 2;
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const step = (w - 2*pad) / (vals.length - 1);
  const pts = vals.map((v, i) => {
    const x = pad + i * step;
    const y = pad + (h - 2*pad) * (1 - (v - min) / range);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const last = vals[vals.length - 1];
  const first = vals[0];
  const color = last >= first ? '#059669' : '#dc2626';
  const lastPt = pts.split(' ').pop().split(',');
  return `<svg class="sparkline" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" aria-hidden="true">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${lastPt[0]}" cy="${lastPt[1]}" r="2" fill="${color}"/>
  </svg>`;
}

function renderTable() {
  const y = currentYear;
  const ym1 = y - 1;
  const ym2 = y - 2;
  document.getElementById('subtitle').textContent =
    `Показатели за ${ym2}, ${ym1}, ${y} гг. Суммы в тыс. руб., рентабельность в %.`;

  const selectedMetrics = METRICS.filter(m => activeMetrics.has(m.key));
  const allYears = [...new Set(Object.values(DATA).flatMap(c => Object.keys(c.years_data).map(Number)))].sort();

  const headers = [{ label: 'Юр. лицо' }];
  selectedMetrics.forEach(m => {
    if (showSparklines) headers.push({ label: `${m.label} — динамика` });
    if (!hiddenColTypes.has('ym2'))  headers.push({ label: `${m.label} ${ym2}` });
    if (!hiddenColTypes.has('ym1'))  headers.push({ label: `${m.label} ${ym1}` });
    if (!hiddenColTypes.has('y'))    headers.push({ label: `${m.label} ${y}` });
    if (!hiddenColTypes.has('pct'))  headers.push({ label: `${m.label} ${y}/${ym1}, %` });
    if (!hiddenColTypes.has('diff')) headers.push({ label: `${m.label} ${y}\u2212${ym1}, руб.` });
  });

  const thead = '<tr>' + headers.map(h => `<th>${h.label}</th>`).join('') + '</tr>';

  const companies = getAllCompanies().filter(([k]) => !hiddenCompanies.has(k));
  let tbody = '';
  companies.forEach(([k, c]) => {
    const yd = c.years_data;
    const cells = [`<td>${nameOf(c, k)}</td>`];
    selectedMetrics.forEach(m => {
      const v_y   = yd[y]?.[m.key];
      const v_ym1 = yd[ym1]?.[m.key];
      const v_ym2 = yd[ym2]?.[m.key];

      if (showSparklines) {
        const trendValues = allYears.map(yr => yd[yr]?.[m.key]).filter(v => v != null);
        cells.push(`<td class="spark-cell">${sparkline(trendValues)}</td>`);
      }
      if (!hiddenColTypes.has('ym2'))  cells.push(fmtValCell(v_ym2, m));
      if (!hiddenColTypes.has('ym1'))  cells.push(fmtValCell(v_ym1, m));
      if (!hiddenColTypes.has('y'))    cells.push(fmtValCell(v_y, m));
      if (!hiddenColTypes.has('pct')) {
        const pct = (v_ym1 != null && v_ym1 !== 0 && v_y != null) ? (v_y - v_ym1) / Math.abs(v_ym1) : null;
        const cls = pct == null ? '' : (pct >= 0 ? 'positive' : 'negative');
        cells.push(`<td class="num ${cls}">${fmtPct(pct)}</td>`);
      }
      if (!hiddenColTypes.has('diff')) {
        const diff = (v_y != null && v_ym1 != null) ? v_y - v_ym1 : null;
        const cls = diff == null ? '' : (diff >= 0 ? 'positive' : 'negative');
        cells.push(`<td class="num ${cls}">${diff == null ? '\u2014' : fmtNum(diff)}</td>`);
      }
    });
    tbody += '<tr>' + cells.join('') + '</tr>';
  });

  document.querySelector('#summary-table thead').innerHTML = thead;
  document.querySelector('#summary-table tbody').innerHTML = tbody;

  const params = new URLSearchParams({
    year: y,
    metrics: [...activeMetrics].join(','),
    hidden_types: [...hiddenColTypes].join(','),
    hidden_companies: [...hiddenCompanies].join(','),
  });
  document.getElementById('export-link').href = `/export/xlsx?${params}`;
}

buildYearSelect();
buildMetricChips();
buildCompanyChips();
renderTable();
</script>
{% endblock %}
