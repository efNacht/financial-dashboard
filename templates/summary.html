{% extends "base.html" %}
{% set active_page = 'summary' %}
{% block title %}Сводная таблица{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Сводная таблица</h1>
  <p class="subtitle">Выручка и прибыль компаний за 2023-2025 гг. Данные в тыс. руб.</p>
</div>

<div class="toolbar">
  <div class="toolbar-group">
    <label>Столбцы прибыли:</label>
    <button class="toggle-btn active" data-cols="profit" onclick="toggleColGroup('profit', this)">Прибыль 23/24/25</button>
    <button class="toggle-btn active" data-cols="growth" onclick="toggleColGroup('growth', this)">Рост %</button>
    <button class="toggle-btn active" data-cols="diff" onclick="toggleColGroup('diff', this)">Разница руб.</button>
    <button class="toggle-btn active" data-cols="sum2y" onclick="toggleColGroup('sum2y', this)">За 2 года</button>
  </div>
  <div class="toolbar-group">
    <label>Компании:</label>
    <input type="text" id="company-filter" placeholder="Поиск..." oninput="filterCompanies(this.value)">
    <button class="btn-small" onclick="toggleAllCompanies()">Все / Снять</button>
  </div>
  <div class="toolbar-group">
    <a href="/export/xlsx" class="btn-export">⬇ Скачать Excel</a>
  </div>
</div>

<div class="company-chips" id="company-chips"></div>

<div class="table-scroll">
  <table class="data-table" id="summary-table">
    <thead></thead>
    <tbody></tbody>
  </table>
</div>

<script>
const DATA = {{ data_json | safe }};

const COL_GROUPS = {
  profit: [4, 5, 6],
  growth: [7, 8],
  diff: [9],
  sum2y: [10],
};
let hiddenCols = new Set();
let hiddenCompanies = new Set();
let allCompaniesOn = true;

function getAllCompanies() {
  return Object.entries(DATA).map(([k, c]) => [k, c]);
}

function nameOf(c, k) { return c.full_name || k; }

function fmtK(v) {
  if (v == null) return '\u2014';
  return Math.round(v).toLocaleString('ru-RU');
}

function fmtPct(v) {
  if (v == null) return '\u2014';
  return Math.round(v * 100) + '%';
}

function toggleColGroup(group, btn) {
  const cols = COL_GROUPS[group];
  btn.classList.toggle('active');
  if (btn.classList.contains('active')) {
    cols.forEach(c => hiddenCols.delete(c));
  } else {
    cols.forEach(c => hiddenCols.add(c));
  }
  renderTable();
}

function toggleCompany(k, chip) {
  if (hiddenCompanies.has(k)) {
    hiddenCompanies.delete(k);
    chip.classList.add('active');
  } else {
    hiddenCompanies.add(k);
    chip.classList.remove('active');
  }
  renderTable();
}

function toggleAllCompanies() {
  allCompaniesOn = !allCompaniesOn;
  const chips = document.querySelectorAll('.company-chip');
  if (allCompaniesOn) {
    hiddenCompanies.clear();
    chips.forEach(c => c.classList.add('active'));
  } else {
    getAllCompanies().forEach(([k]) => hiddenCompanies.add(k));
    chips.forEach(c => c.classList.remove('active'));
  }
  renderTable();
}

function filterCompanies(q) {
  q = q.toLowerCase();
  document.querySelectorAll('.company-chip').forEach(chip => {
    chip.style.display = chip.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function buildChips() {
  const container = document.getElementById('company-chips');
  container.innerHTML = getAllCompanies().map(([k, c]) =>
    `<span class="company-chip active" onclick="toggleCompany('${k}', this)">${nameOf(c, k)}</span>`
  ).join('');
}

function renderTable() {
  const companies = getAllCompanies().filter(([k]) => !hiddenCompanies.has(k));
  const allHeaders = [
    {idx: 0, text: 'Юр. лицо'},
    {idx: 1, text: 'Выручка 2023'},
    {idx: 2, text: 'Выручка 2024'},
    {idx: 3, text: 'Выручка 2025'},
    {idx: 4, text: 'Чист. прибыль 2023'},
    {idx: 5, text: 'Чист. прибыль 2024'},
    {idx: 6, text: 'Чист. прибыль 2025'},
    {idx: 7, text: 'Приб. 24/23, %'},
    {idx: 8, text: 'Приб. 25/24, %'},
    {idx: 9, text: 'Приб. 25\u201324, руб.'},
    {idx: 10, text: 'Приб. за 2 года'},
  ];
  const visibleHeaders = allHeaders.filter(h => !hiddenCols.has(h.idx));

  let thead = '<tr>' + visibleHeaders.map(h => `<th>${h.text}</th>`).join('') + '</tr>';
  let tbody = '';

  companies.forEach(([k, c]) => {
    const yd = c.years_data;
    const d23 = yd[2023] || {}, d24 = yd[2024] || {}, d25 = yd[2025] || {};
    const r23 = d23.revenue || 0, r24 = d24.revenue || 0, r25 = d25.revenue || 0;
    const p23 = d23.net_profit || 0, p24 = d24.net_profit || 0, p25 = d25.net_profit || 0;
    const g2423 = p23 ? (p24 - p23) / Math.abs(p23) : null;
    const g2524 = p24 ? (p25 - p24) / Math.abs(p24) : null;
    const diff = p25 - p24;
    const sum2y = p24 + p25;

    const allCells = [
      {idx: 0, html: `<td>${nameOf(c, k)}</td>`},
      {idx: 1, html: `<td class="num">${r23 ? fmtK(r23) : '\u2014'}</td>`},
      {idx: 2, html: `<td class="num">${r24 ? fmtK(r24) : '\u2014'}</td>`},
      {idx: 3, html: `<td class="num">${r25 ? fmtK(r25) : '\u2014'}</td>`},
      {idx: 4, html: `<td class="num ${p23>=0?'positive':'negative'}">${p23 ? fmtK(p23) : '\u2014'}</td>`},
      {idx: 5, html: `<td class="num ${p24>=0?'positive':'negative'}">${p24 ? fmtK(p24) : '\u2014'}</td>`},
      {idx: 6, html: `<td class="num ${p25>=0?'positive':'negative'}">${p25 ? fmtK(p25) : '\u2014'}</td>`},
      {idx: 7, html: `<td class="num ${(g2423||0)>=0?'positive':'negative'}">${g2423 !== null ? Math.round(g2423*100)+'%' : '\u2014'}</td>`},
      {idx: 8, html: `<td class="num ${(g2524||0)>=0?'positive':'negative'}">${g2524 !== null ? Math.round(g2524*100)+'%' : '\u2014'}</td>`},
      {idx: 9, html: `<td class="num ${diff>=0?'positive':'negative'}">${fmtK(diff)}</td>`},
      {idx: 10, html: `<td class="num ${sum2y>=0?'positive':'negative'}">${fmtK(sum2y)}</td>`},
    ];
    const visibleCells = allCells.filter(c => !hiddenCols.has(c.idx));
    tbody += '<tr>' + visibleCells.map(c => c.html).join('') + '</tr>';
  });

  document.querySelector('#summary-table thead').innerHTML = thead;
  document.querySelector('#summary-table tbody').innerHTML = tbody;
}

buildChips();
renderTable();
</script>
{% endblock %}
